<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>

html, body, #root { height: 100%; }
body { font-family: 'DM Mono', 'Courier New', monospace; background: #0d0f14; color: #e2e8f0; overflow: hidden; }

.card { background: #161b27; border: 1px solid #1e2535; border-radius: 10px; }

.back-btn { background: none; border: none; color: #6366f1; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; padding: 0; }
.back-btn:hover { color: #818cf8; }
.cat-card-active {

}
.cat-card { padding: 16px; cursor: pointer; transition: border-color 0.15s; background: #161b27; border: 1px solid #1e2535; border-radius: 10px; }
.cat-card:hover { border-color: #6366f1; }
.quick-btn { background: #1e2040; border: 1px solid #2d3a5a; color: #a5b4fc; padding: 8px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.quick-btn:hover { background: #2a2a55; border-color: #6366f1; }
.stat-card-btn:hover {
  border-color: #6366f1 !important;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(99,102,241,0.2);
}
.stat-card { padding: 14px 20px; min-width: 100px; text-align: center; background: #161b27; border: 1px solid #1e2535; border-radius: 10px; }
.ai-textarea { background: #0a0c12; border: 1px solid #2d3a5a; border-radius: 10px; padding: 14px 16px; color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 14px; outline: none; resize: none; line-height: 1.7; width: 100%; transition: border-color 0.2s; }
.ai-textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }

.ai-submit-btn { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 10px; color: white; padding: 12px 28px; font-family: 'DM Mono', monospace; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; letter-spacing: 0.3px; }
.ai-submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.35); }

.ai-result-card { background: #0f1420; border: 1px solid #1e2535; border-radius: 12px; overflow: hidden; transition: border-color 0.15s; }

.ai-result-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1a2035; }
.ai-result-body { padding: 16px 20px; }
.ai-rank-badge { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; flex-shrink: 0; }
.ai-view-btn { background: #1e2040; border: 1px solid #3a3f6b; border-radius: 7px; color: #a5b4fc; padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; margin-top: 12px; }
.ai-view-btn:hover { background: #2a2a55; border-color: #6366f1; }
.pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6366f1; animation: pulse-anim 1.2s infinite; }
.pulse-dot:nth-child(2) { animation-delay: 0.2s; }
.pulse-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse-anim { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.suggestion-chip { background: #161b27; border: 1px solid #1e2535; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #64748b; cursor: pointer; transition: all 0.15s; font-family: 'DM Mono', monospace; }
.suggestion-chip:hover { border-color: #6366f1; color: #a5b4fc; background: #1e2040; }
.ai-confidence { height: 3px; border-radius: 2px; margin-top: 8px; }
.quiz-cat-card { background: #0f1420; border: 1px solid #1e2535; border-radius: 12px; padding: 18px; cursor: pointer; transition: all 0.18s; text-align: left; font-family: 'DM Mono', monospace; color: #e2e8f0; width: 100%; }
.quiz-cat-card:hover { border-color: #6366f1; background: #141b2d; transform: translateY(-1px); }
.quiz-cat-card.selected { border-color: #6366f1; background: #1e2040; box-shadow: 0 0 0 1px #6366f1; }
.diff-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; font-family: 'DM Mono', monospace; transition: all 0.12s; }
.diff-beginner { background: #1a3a2a; color: #4ade80; border-color: #1a3a2a; }
.diff-intermediate { background: #1e2f4a; color: #60a5fa; border-color: #1e2f4a; }
.diff-advanced { background: #2a1a3a; color: #c084fc; border-color: #2a1a3a; }
.diff-all { background: #1e2535; color: #94a3b8; border-color: #1e2535; }
.diff-active-b { background: #1a3a2a; border-color: #4ade80 !important; color: #4ade80; }
.diff-active-i { background: #1e2f4a; border-color: #60a5fa !important; color: #60a5fa; }
.diff-active-a { background: #2a1a3a; border-color: #c084fc !important; color: #c084fc; }
.diff-active-all { background: #1e2040; border-color: #6366f1 !important; color: #a5b4fc; }
.explanation-box { background: #111827; border-left: 3px solid #6366f1; border-radius: 0 8px 8px 0; padding: 12px 16px; margin-top: 14px; font-size: 13px; color: #93c5fd; line-height: 1.7; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.score-ring { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
.history-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e2535; font-size: 13px; }
.quiz-nav-btn { background: #1e2535; border: 1px solid #2d3748; border-radius: 8px; color: #94a3b8; padding: 8px 18px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.quiz-nav-btn:hover:not(:disabled) { background: #2d3748; color: #e2e8f0; }
.quiz-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.quiz-nav-btn.primary { background: #6366f1; border-color: #6366f1; color: white; }
.quiz-nav-btn.primary:hover:not(:disabled) { background: #5254cc; }

.pg-cell { border: 1px solid #1a2035; min-width: 90px; height: 30px; padding: 0 8px; font-size: 12px; font-family: 'DM Mono', monospace; color: #e2e8f0; background: #0d0f14; cursor: default; display: flex; align-items: center; overflow: hidden; white-space: nowrap; }
.pg-cell.header { background: #0a0c12; color: #475569; font-size: 11px; justify-content: center; min-width: 90px; font-weight: 500; border-color: #1e2535; user-select: none; }
.pg-cell.row-header { min-width: 36px; max-width: 36px; justify-content: center; color: #334155; font-size: 11px; background: #0a0c12; border-color: #1e2535; }
.pg-cell.active { border-color: #6366f1 !important; background: #0d1020 !important; z-index: 2; }
.pg-cell.result-cell { color: #4ade80; background: #0a1a0d; }
.pg-cell.error-cell { color: #f87171; background: #1a0808; }
.pg-formula-bar { background: #0a0c12; border: 1px solid #1e2535; border-radius: 8px; padding: 9px 14px; color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; width: 100%; transition: border-color 0.15s; }
.pg-formula-bar:focus { border-color: #6366f1; }
.pg-scenario-btn { padding: 7px 14px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; border: 1px solid #1e2535; background: #0d0f14; color: #64748b; transition: all 0.15s; }
.pg-scenario-btn:hover { border-color: #6366f1; color: #a5b4fc; background: #1e2040; }
.pg-scenario-btn.active { background: #1e2040; border-color: #6366f1; color: #a5b4fc; }
.pg-run-btn { background: linear-gradient(135deg,#10b981,#059669); border: none; border-radius: 7px; color: white; padding: 8px 18px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.pg-run-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.pg-result-box { border-radius: 10px; padding: 14px 18px; font-size: 13px; font-family: 'DM Mono', monospace; line-height: 1.7; }
.pg-result-ok { background: #0a1a0d; border: 1px solid #1a4a2a; color: #4ade80; }
.pg-result-err { background: #1a0808; border: 1px solid #4a1a1a; color: #f87171; }
.pg-challenge-card { background: #0f1420; border: 1px solid #1e2535; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; text-align: left; font-family: 'DM Mono', monospace; width: 100%; color: #e2e8f0; display: flex; align-items: flex-start; }
.pg-challenge-card:hover { border-color: #6366f1; background: #141b2d; color: #f1f5f9; }
.pg-challenge-card.done { border-color: #1a4a2a; background: #0a1a0d; color: #86efac; }

/* ── Mobile / Hamburger ─────────────────────────────────── */
.hamburger-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  background: none;
  border: 1px solid #1e2535;
  border-radius: 7px;
  padding: 7px 8px;
  cursor: pointer;
  flex-shrink: 0;
}
.ham-line {
  display: block;
  width: 18px;
  height: 2px;
  background: #94a3b8;
  border-radius: 2px;
  transition: transform 0.22s ease, opacity 0.22s ease;
  transform-origin: center;
}
.ham-open-1 { transform: translateY(7px) rotate(45deg); }
.ham-open-2 { opacity: 0; transform: scaleX(0); }
.ham-open-3 { transform: translateY(-7px) rotate(-45deg); }

.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 199;
}

/* Sidebar defaults (desktop) */
.sidebar {
  width: 252px;
  border-right: 1px solid #1e2535;
  padding: 14px 10px;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 13px;
  background: #0d0f14;
  z-index: 200;
  transition: transform 0.25s ease;
}

/* ── Responsive breakpoints ─────────────────────────────── */
@media (max-width: 768px) {
  .hamburger-btn { display: flex; }
  .sidebar-backdrop.backdrop-visible { display: block; }

  /* Sidebar slides in from left on mobile */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 280px;
    transform: translateX(-100%);
    padding-top: 60px;
    box-shadow: 4px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.sidebar-open {
    transform: translateX(0);
  }
  /* Header tighter on mobile */
  .header-subtitle { display: none; }
  .header-progress { display: none; }

  /* Main content full width, less padding */
  .main-content {
    padding: 16px 14px !important;
  }

  /* Stat cards row wraps nicely */
  .stat-card { min-width: 80px !important; padding: 10px 12px !important; }

  /* Category grid single column on small screens */
  .cat-grid { grid-template-columns: 1fr 1fr !important; }

  /* Formula detail wider on mobile */
  .formula-detail { max-width: 100% !important; }

  /* Quiz max-width full */
  .quiz-container { max-width: 100% !important; }

  /* Code blocks scroll horizontally */
  .code-block { overflow-x: auto; word-break: break-all; white-space: pre-wrap; }

  /* Level toggle smaller */
  .level-toggle { gap: 2px; }
  .level-btn { padding: 5px 10px; font-size: 11px; }

  /* Playground tabs wrap */
  .pg-tab-row { flex-wrap: wrap; gap: 4px; }

  /* Quick start chips wrap */
  .quickstart-chips { gap: 6px; }

  /* Formula header wraps */
  .formula-header { flex-direction: column; align-items: flex-start !important; gap: 10px !important; }
  .syntax-badge { font-size: 11px !important; padding: 8px 12px !important; }

  /* Back button */
  .back-btn-wrap { margin-bottom: 14px; }

  /* Tabs row in sidebar */
  .sidebar-tabs { gap: 2px; }
  .tab-btn { padding: 7px 8px; font-size: 10px; }
}

@media (max-width: 480px) {
  .cat-grid { grid-template-columns: 1fr !important; }
  .header-logo-text { display: none; }
}

</style>
</head>
<body>
<div id="root"></div>

<script>
/* All data and logic — plain JS, parsed natively */
const { useState } = React;

const SUGGESTIONS = [
  "I want to count how many times a value appears in a list",
  "Sum sales only for a specific region and product",
  "Look up a customer name and return their email",
  "Calculate someone's age from their date of birth",
  "Remove extra spaces from messy imported data",
  "Return a value from another sheet dynamically",
  "Show 'Pass' or 'Fail' based on a score",
  "Combine data from multiple tabs into one table",
];
const CATEGORIES = {
  "📊 Math & Stats": ["SUM", "SUMIF", "SUMIFS", "AVERAGE", "AVERAGEIF", "AVERAGEIFS", "COUNT", "COUNTA", "COUNTIF", "COUNTIFS", "COUNTBLANK", "MIN", "MAX", "LARGE", "SMALL", "ROUND", "ROUNDUP", "ROUNDDOWN", "MOD", "SUMPRODUCT", "ABS"],
  "🔍 Lookup & Reference": ["VLOOKUP", "XLOOKUP", "INDEX", "MATCH", "INDIRECT", "CHOOSECOLS", "OFFSET", "ROW", "COLUMN"],
  "⚖️ Logic": ["IF", "IFS", "AND", "OR", "NOT", "IFERROR", "IFNA", "ISERROR", "ISNA", "ISERR", "ISBLANK", "ISNUMBER", "ISTEXT", "SWITCH"],
  "📅 Date & Time": ["TODAY", "NOW", "DATE", "DAY", "MONTH", "YEAR", "DATEDIF", "EOMONTH", "WEEKDAY", "NETWORKDAYS", "WORKDAY"],
  "🔤 Text": ["TRIM", "CLEAN", "PROPER", "EXACT", "LEFT", "RIGHT", "MID", "LEN", "FIND", "SEARCH", "SUBSTITUTE", "CONCATENATE", "TEXTJOIN", "UPPER", "LOWER", "VALUE", "TEXT"],
  "🗂️ Data Tools": ["FILTER", "SORT", "SORTBY", "UNIQUE", "VSTACK", "QUERY", "IMPORTRANGE", "LET", "LAMBDA", "SEQUENCE", "RANDARRAY"],
};
const FORMULAS = {
  SUM: {
    syntax: "SUM(value1, value2, ...)",
    tagline: "Add numbers together — like a calculator, but smarter.",
    beginner: {
      explain: "SUM adds up all the numbers you give it. Think of it like counting your coins — you just dump them all in and it tells you the total.",
      example: { formula: "=SUM(10, 20, 30)", result: "60", context: "Adds 10 + 20 + 30" },
      rangeExample: { formula: "=SUM(A1:A5)", result: "Sum of A1 to A5", context: "Adds all numbers from cell A1 down to A5" },
      tip: "💡 You can also write =SUM(A1:A100) to add a whole column of numbers at once!",
      sampleTable: { headers: ["A: Sales ($)"], rows: [["1200"],["850"],["3400"],["670"],["2100"]], usage: "=SUM(A2:A6)", output: "8220" , whatsHappening: 'Adds A2+A3+A4+A5+A6 (1200+850+3400+670+2100) = 8220'},
    },
    advanced: {
      nesting: '=SUM(IF(A2:A10="Sales", B2:B10, 0))\n→ Combine SUM with IF for conditional totals\n→ Press Ctrl+Shift+Enter for array formula (older Excel)',
      optimize: "Use SUM over multiple manual additions. =SUM(A:A) is faster to maintain than =A1+A2+A3+...\n\nFor dynamic ranges, combine with OFFSET:\n=SUM(OFFSET(A1,0,0,COUNTA(A:A),1))",
      nested: "=SUMPRODUCT(SUM(IF(MONTH(A2:A100)=1,B2:B100,0)))\n→ Sum January values only (array-based, no helper column)",
    },
    excel: true, gsheet: true, color: "#10b981",
  },
  SUMIF: {
    syntax: "SUMIF(range, condition, sum_range)",
    tagline: "Add only the numbers that match your rule.",
    beginner: {
      explain: "SUMIF is like SUM, but with a filter. Imagine you have a list of expenses and only want to total up the 'Food' ones — SUMIF does exactly that!",
      example: { formula: '=SUMIF(A2:A10, "Food", B2:B10)', result: "Total of all Food expenses", context: "Only adds values in column B where column A says 'Food'" },
      tip: "💡 The condition can use wildcards: \"App*\" matches anything starting with 'App'",
      sampleTable: { headers: ['A: Category','B: Amount ($)'], rows: [['Food','450'],['Travel','1200'],['Food','320'],['Tech','800'],['Food','175']], usage: '=SUMIF(A2:A6,"Food",B2:B6)', output: '945' , whatsHappening: 'Looks at column A for \'Food\', then adds the matching B values: 450+320+175 = 945'},
    },
    advanced: {
      nesting: '=SUMIF(TEXT(A2:A100,"mmm"), "Jan", B2:B100)\n→ Nest with TEXT to match by month name',
      optimize: "For multiple conditions, switch to SUMIFS instead of nesting multiple SUMIFs — it's cleaner and faster.",
      nested: '=SUMIF(A2:A100, ">"&AVERAGE(A2:A100), B2:B100)\n→ Sum values where column A is above average',
    },
    excel: true, gsheet: true, color: "#10b981",
  },
  SUMIFS: {
    syntax: "SUMIFS(sum_range, range1, condition1, range2, condition2, ...)",
    tagline: "Add numbers that match multiple rules at once.",
    beginner: {
      explain: "SUMIFS is SUMIF's big sibling — it lets you set multiple conditions. Like only totaling sales that are from 'East region' AND above $1000.",
      example: { formula: '=SUMIFS(C2:C10, A2:A10, "East", B2:B10, ">1000")', result: "Total qualifying sales", context: "Sums column C where A = 'East' AND B > 1000" },
      tip: "💡 The sum range always goes FIRST in SUMIFS (opposite intuition from SUMIF!)",

function evalFormula(formulaStr, scenarioKey) {
  const scenario = PLAYGROUND_SCENARIOS[scenarioKey];
  if (!scenario) return { error: "No scenario selected" };

  const rawFormula = formulaStr.trim();
  if (!rawFormula.startsWith("=")) return { error: "Formula must start with = (e.g. =SUM(C2:C11))" };

  const rows = scenario.rows;
  const cols = scenario.cols;
  const DATA_ROW_START = 2;
  const DATA_ROW_END = DATA_ROW_START + rows.length - 1; // rows 2..11

  const getCell = (col, row) => {
    const cIdx = col.toUpperCase().charCodeAt(0) - 65;
    const rIdx = row - DATA_ROW_START;
    if (row === 1) return cols[cIdx] || "";
    if (rIdx < 0 || rIdx >= rows.length) return 0;
    const val = rows[rIdx][cIdx];
    return val === undefined ? 0 : val;
  };

  // Full column range like A:A resolves to data rows 2..11
  const getColArray = (col) => {
    const cIdx = col.toUpperCase().charCodeAt(0) - 65;
    return rows.map(function(row) {
      var v = row[cIdx];
      return v === undefined ? 0 : v;
    });
  };

  const getRange = (col1, row1, col2, row2) => {
    const vals = [];
    const cStart = col1.toUpperCase().charCodeAt(0) - 65;
    const cEnd = col2.toUpperCase().charCodeAt(0) - 65;
    for (let r = row1; r <= row2; r++) {
      for (let c = cStart; c <= cEnd; c++) {
        const rIdx = r - DATA_ROW_START;
        if (rIdx >= 0 && rIdx < rows.length) {
          const v = rows[rIdx][c];
          vals.push(v === undefined ? 0 : v);
        }
      }
    }
    return vals;
  };

  // Parse a range string — supports A2:A11, A:A, A1:A (mixed)
  const parseRange = (rangeStr) => {
    const s = rangeStr.trim().toUpperCase();
    // Full column range: A:A or A:C
    const fullCol = s.match(/^([A-Z]):([A-Z])$/);
    if (fullCol) {
      const cStart = fullCol[1].charCodeAt(0) - 65;
      const cEnd = fullCol[2].charCodeAt(0) - 65;
      const vals = [];
      for (let c = cStart; c <= cEnd; c++) {
        rows.forEach(function(row) {
          var v = row[c];
          vals.push(v === undefined ? 0 : v);
        });
      }
      return vals;
    }
    // Standard range: A2:E11
    const stdRange = s.match(/^([A-Z])(\d+):([A-Z])(\d+)$/);
    if (stdRange) {
      return getRange(stdRange[1], parseInt(stdRange[2]), stdRange[3], parseInt(stdRange[4]));
    }
    return null;
  };

  const resolveArg = (arg) => {
    arg = arg.trim();
    // String literal
    if ((arg.startsWith('"') && arg.endsWith('"')) || (arg.startsWith("'") && arg.endsWith("'"))) {
      return arg.slice(1, -1);
    }
    // Full column ref A:A
    if (/^[A-Za-z]:[A-Za-z]$/.test(arg)) {
      return parseRange(arg.toUpperCase());
    }
    // Standard range A2:E11
    if (/^[A-Za-z]\d+:[A-Za-z]\d+$/.test(arg)) {
      return parseRange(arg.toUpperCase());
    }
    // Cell ref A2
    const cellM = arg.match(/^([A-Za-z])(\d+)$/);
    if (cellM) return getCell(cellM[1], parseInt(cellM[2]));
    // Number
    if (!isNaN(arg) && arg !== "") return parseFloat(arg);
    // Comparison string like ">100" or ">=5" — return as-is
    if (/^(>=|<=|<>|>|<)/.test(arg)) return arg;
    return arg;
  };

  // Split args respecting nested parens and quotes
  const splitArgs = (str) => {
    const args = [];
    let depth = 0, cur = "", inQ = false, qChar = "";
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (inQ) { cur += ch; if (ch === qChar) inQ = false; continue; }
      if (ch === '"' || ch === "'") { inQ = true; qChar = ch; cur += ch; continue; }
      if (ch === '(') { depth++; cur += ch; continue; }
      if (ch === ')') { depth--; cur += ch; continue; }
      if (ch === ',' && depth === 0) { args.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    if (cur.trim()) args.push(cur.trim());
    return args;
  };

  const nums = (arr) => (Array.isArray(arr) ? arr.flat() : [arr]).filter(function(v) { return typeof v === "number" && !isNaN(v); });

  const matchCriteria = (val, crit) => {
    if (typeof crit === "string") {
      const m = crit.match(/^(>=|<=|<>|>|<)(.+)$/);
      if (m) {
        const op = m[1], num = parseFloat(m[2]);
        if (op === ">") return val > num;
        if (op === "<") return val < num;
        if (op === ">=") return val >= num;
        if (op === "<=") return val <= num;
        if (op === "<>") return String(val).toLowerCase() !== String(num).toLowerCase();
      }
      if (crit.indexOf("*") !== -1) {
        const re = new RegExp("^" + crit.replace(/\*/g, ".*").replace(/\?/g, ".") + "$", "i");
        return re.test(String(val));
      }
      return String(val).toLowerCase() === crit.toLowerCase();
    }
    return val === crit;
  };

  // Recursively evaluate a nested expression (handles nested functions)
  const evalExpr = (expr) => {
    expr = expr.trim();
    const funcMatch = expr.match(/^([A-Za-z]+)\(([\s\S]*)\)$/);
    if (funcMatch) {
      return execFunc(funcMatch[1].toUpperCase(), funcMatch[2]);
    }
    return resolveArg(expr);
  };

  const execFunc = (fn, argsStr) => {
    const rawArgs = splitArgs(argsStr);
    // Resolve each arg — recursively eval nested functions
    const args = rawArgs.map(function(a) {
      a = a.trim();
      // Nested function call
      if (/^[A-Za-z]+\(/.test(a)) return evalExpr(a);
      return resolveArg(a);
    });

    switch(fn) {
      case "SUM": return nums(args).reduce(function(a,b) { return a+b; }, 0);
      case "AVERAGE": {
        const n = nums(args);
        return n.length ? n.reduce(function(a,b) { return a+b; }, 0) / n.length : 0;
      }
      case "COUNT": return nums(args).length;
      case "COUNTA": return (Array.isArray(args[0]) ? args[0] : args).filter(function(v) { return v !== "" && v !== null && v !== undefined; }).length;
      case "COUNTBLANK": return (Array.isArray(args[0]) ? args[0] : args).filter(function(v) { return v === "" || v === null || v === undefined; }).length;
      case "MIN": return Math.min.apply(null, nums(args));
      case "MAX": return Math.max.apply(null, nums(args));
      case "ABS": return Math.abs(typeof args[0] === "number" ? args[0] : 0);
      case "ROUND": return parseFloat((args[0] * 1).toFixed(Math.max(0, args[1] || 0)));
      case "ROUNDUP": {
        const d = args[1] || 0;
        const f = Math.pow(10, d);

                                </td>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            <tr style={{ background: "#1e3a5f" }}>
                              <td style={{ background: "#1d2433", border: "1px solid #374151", borderRight: "2px solid #4b5563", padding: "3px 0", textAlign: "center", color: "#6b7280", fontSize: 10 }}>1</td>

              {/* FREE PRACTICE */}
              {pgMode === "free" && (
                <div>
                  <div className="card" style={{ padding: 16, marginBottom: 16 }}>

                      </div>
                      <div style={{ fontSize: 11, color: "#334155", marginLeft: 4 }}>

                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <div style={{ background: "#0a0c12", border: "1px solid #1e2535", borderRadius: 6, padding: "8px 12px", fontSize: 12, color: "#475569", fontStyle: "italic" }}>fx</div>

                        onChange={e => { setPgFormula(e.target.value); setPgResult(null); }}

                  {pgResult && (
                    <div className={"pg-result-box " + (pgResult.error ? "pg-result-err" : "pg-result-ok")} style={{ marginBottom: 16 }}>
                      {pgResult.error ? (
                        <div>
                          <div style={{ fontWeight: 600, marginBottom: 6, color: "#f87171" }}>⚠ {pgResult.error}</div>
                          <div style={{ fontSize: 11, color: "#64748b" }}>
                            {pgResult.error.includes("not supported") ? "💡 This function isn't available in the playground engine yet." :
                             pgResult.error.includes("start with =") ? "💡 Formulas must start with = e.g. =SUM(D2:D11)" :

                        </div>
                      ) : (
                        <div>
                          <div style={{ fontSize: 11, color: "#10b981", marginBottom: 4, textTransform: "uppercase", letterSpacing: "1px" }}>Result</div>
                          <div style={{ fontSize: 22, fontWeight: 600 }}>
                            {Array.isArray(pgResult.value) ? "[" + pgResult.value.slice(0,5).join(", ") + (pgResult.value.length > 5 ? "... +" + (pgResult.value.length-5) + " more" : "") + "]"
                              : typeof pgResult.value === "number" ? (Number.isInteger(pgResult.value) ? pgResult.value.toLocaleString() : pgResult.value.toLocaleString(undefined, {maximumFractionDigits: 4}))
                              : String(pgResult.value)}

                        </div>

                        { n: "COUNTA", f: '=COUNTA(B2:B11)' }, { n: "MAX", f: '=MAX(D2:D11)' }, { n: "MIN", f: '=MIN(D2:D11)' },
                        { n: "LARGE", f: '=LARGE(D2:D11,2)' }, { n: "SMALL", f: '=SMALL(D2:D11,2)' },
                        { n: "SUMIF", f: '=SUMIF(C2:C11,"Sales",D2:D11)' }, { n: "COUNTIF", f: '=COUNTIF(C2:C11,"Sales")' },
                        { n: "AVERAGEIF", f: '=AVERAGEIF(C2:C11,"IT",D2:D11)' },
                        { n: "SUMIFS", f: '=SUMIFS(D2:D11,C2:C11,"Sales",F2:F11,"Active")' },
                        { n: "COUNTIFS", f: '=COUNTIFS(C2:C11,"IT",F2:F11,"Active")' },
                        { n: "SUMPRODUCT", f: '=SUMPRODUCT(D2:D11,E2:E11)' },
                        { n: "ROUND", f: '=ROUND(D2,-3)' }, { n: "MOD", f: '=MOD(D2,10000)' }, { n: "ABS", f: '=ABS(D2-D3)' },
                      ]},
                      { cat: "🔍 Lookup & Reference", color: "#6366f1", fns: [
                        { n: "VLOOKUP", f: '=VLOOKUP("Eve",B2:F11,3,FALSE)' }, { n: "XLOOKUP", f: '=XLOOKUP("Hank",B2:B11,C2:C11)' },
                        { n: "INDEX", f: '=INDEX(B2:F11,5,1)' }, { n: "MATCH", f: '=MATCH("Grace",B2:B11,0)' },
                        { n: "FILTER", f: '=FILTER(B2:B11,F2:F11="Active")' }, { n: "UNIQUE", f: '=UNIQUE(C2:C11)' },
                        { n: "SORT", f: '=SORT(B2:B11)' }, { n: "CHOOSECOLS", f: '=CHOOSECOLS(A2:F11,2,4)' },
                      ]},
                      { cat: "⚖️ Logic", color: "#f59e0b", fns: [
                        { n: "IF", f: '=IF(D2>69400,"High","Low")' }, { n: "IFS", f: '=IFS(D2>=80000,"Senior",D2>=60000,"Mid",TRUE,"Junior")' },
                        { n: "AND", f: '=AND(C2="Sales",F2="Active")' }, { n: "OR", f: '=OR(C2="HR",F2="Inactive")' },
                        { n: "IFERROR", f: '=IFERROR(VLOOKUP("Zara",B2:D11,3,FALSE),"Not found")' },

                              <div style={{ background: "linear-gradient(135deg,#0a2a0f,#0d2010)", border: "2px solid #166534", borderRadius: 12, padding: 24, textAlign: "center" }}>

                                <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 18, color: "#4ade80", marginBottom: 4 }}>Correct!</div>
                                <div style={{ fontSize: 13, color: "#86efac", marginBottom: 16 }}>Your result: <strong>{String(pgResult.value)}</strong></div>
                                <button className="pg-run-btn" style={{ background: "linear-gradient(135deg,#6366f1,#a855f7)" }} onClick={() => { setPgActiveChallenge(null); setPgResult(null); setPgFormula(""); }}>← Next challenge</button>
                              </div>

                              <div className="pg-result-box pg-result-err">
                                <div style={{ display: "flex", gap: 16, marginBottom: 10, flexWrap: "wrap" }}>
                                  <div style={{ flex: 1, minWidth: 120 }}><div style={{ fontSize: 10, color: "#f87171", textTransform: "uppercase", marginBottom: 3 }}>Your result</div><div style={{ fontSize: 16, color: "#fca5a5", fontWeight: 600 }}>{String(pgResult.value)}</div></div>
                                  <div style={{ flex: 1, minWidth: 120 }}><div style={{ fontSize: 10, color: "#4ade80", textTransform: "uppercase", marginBottom: 3 }}>Expected</div><div style={{ fontSize: 16, color: "#4ade80", fontWeight: 600 }}>{challenge.expected}</div></div>
                                </div>
                                <div style={{ fontSize: 12, color: "#94a3b8" }}>💡 Double-check your column references and condition strings.</div>

                              onClick={() => { setPgFormula(challenge.target); setPgResult(null); }}>Use this formula</button>
                          </div>
                        </details>
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* CROSS-REFERENCE */}
              {pgMode === "cross" && (
                <div>
                  <div style={{ background: "#0d1a30", border: "1px solid #1e3a5f", borderRadius: 10, padding: "14px 18px", marginBottom: 20 }}>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 14, color: "#93c5fd", marginBottom: 6 }}>🔗 How cross-referencing works</div>
                    <div style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.8 }}>
                      Both tables share an <strong style={{ color: "#a5b4fc" }}>EmpID</strong> column (A in Employees, B in Sales).<br/>
                      Use <strong style={{ color: "#a5b4fc" }}>VLOOKUP / XLOOKUP</strong> to look up a value from one table while working in the other.<br/>

                    </div>

                    <div>

                    const isWrong = pgResult && !pgResult.error && !challenge.check(pgResult.value);
                    const sc = PLAYGROUND_SCENARIOS[challenge.activeTable];
                    return (
                      <div>
                        <button className="back-btn" style={{ marginBottom: 16 }} onClick={() => { setPgActiveChallenge(null); setPgResult(null); setPgFormula(""); }}>← All cross-reference challenges</button>
                        <div style={{ background: "#0d1a30", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#7dd3fc" }}>
                          📊 Active table: <strong>{sc.label}</strong> — {sc.cols.map((c,i) => String.fromCharCode(65+i)+"="+c).join("  ")}
                        </div>
                        <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                          <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 17, color: "#e2e8f0", marginBottom: 6 }}>{challenge.label}</div>
                          <div style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.7, marginBottom: 14 }}>{challenge.desc}</div>
                          <div style={{ background: "#0a1a0d", border: "1px solid #1a4a2a", borderRadius: 6, padding: "8px 14px", fontSize: 13, color: "#4ade80", marginBottom: 14 }}>Expected: <strong>{challenge.expected}</strong></div>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <div style={{ background: "#0a0c12", border: "1px solid #1e2535", borderRadius: 6, padding: "8px 10px", fontSize: 12, color: "#475569", fontStyle: "italic" }}>fx</div>
                            <input className="pg-formula-bar"
                              style={{ borderColor: isCorrect ? "#10b981" : isWrong ? "#ef4444" : undefined }}
                              placeholder="Type your formula here..."
                              value={pgFormula}
                              onChange={e => { setPgFormula(e.target.value); setPgResult(null); }}
                              onKeyDown={e => { if (e.key === "Enter") { const r = evalFormula(pgFormula, challenge.activeTable); setPgResult(r); if (!r.error && challenge.check(r.value)) setPgCompleted(prev => ({ ...prev, [challenge.id]: true })); }}}
                            />
                            <button className="pg-run-btn" onClick={() => { const r = evalFormula(pgFormula, challenge.activeTable); setPgResult(r); if (!r.error && challenge.check(r.value)) setPgCompleted(prev => ({ ...prev, [challenge.id]: true })); }}>▶ Run</button>
                          </div>
                        </div>
                        {pgResult && (
                          <div style={{ marginBottom: 16 }}>
                            {pgResult.error ? (
                              <div className="pg-result-box pg-result-err"><div style={{ fontWeight: 600, color: "#f87171" }}>⚠ {pgResult.error}</div></div>
                            ) : isCorrect ? (
                              <div style={{ background: "linear-gradient(135deg,#0a2a0f,#0d2010)", border: "2px solid #166534", borderRadius: 12, padding: 24, textAlign: "center" }}>
                                <div style={{ fontSize: 28, marginBottom: 6 }}>🎉</div>
                                <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 18, color: "#4ade80", marginBottom: 4 }}>Correct!</div>
                                <div style={{ fontSize: 13, color: "#86efac", marginBottom: 16 }}>Result: <strong>{String(pgResult.value)}</strong></div>
                                <button className="pg-run-btn" style={{ background: "linear-gradient(135deg,#6366f1,#a855f7)" }} onClick={() => { setPgActiveChallenge(null); setPgResult(null); setPgFormula(""); }}>← Next challenge</button>
                              </div>
                            ) : (
                              <div className="pg-result-box pg-result-err">
                                <div style={{ display: "flex", gap: 16, marginBottom: 8, flexWrap: "wrap" }}>
                                  <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: "#fca5a5", textTransform: "uppercase", marginBottom: 3 }}>Your result</div><div style={{ fontSize: 16, color: "#fca5a5", fontWeight: 600 }}>{String(pgResult.value)}</div></div>
                                  <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: "#86efac", textTransform: "uppercase", marginBottom: 3 }}>Expected</div><div style={{ fontSize: 16, color: "#86efac", fontWeight: 600 }}>{challenge.expected}</div></div>
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                        <details style={{ marginTop: 4 }}>
                          <summary style={{ fontSize: 12, color: "#94a3b8", cursor: "pointer", userSelect: "none" }}>💡 Show answer</summary>
                          <div style={{ marginTop: 10, background: "#0a0c12", border: "1px solid #1e2535", borderRadius: 8, padding: 14 }}>
                            <div style={{ fontSize: 13, color: "#4ade80", fontFamily: "'DM Mono', monospace", marginBottom: 8 }}>{challenge.target}</div>
                            <button style={{ fontSize: 11, background: "#1e2535", border: "1px solid #2d3748", borderRadius: 6, color: "#94a3b8", padding: "5px 12px", cursor: "pointer", fontFamily: "inherit" }}
                              onClick={() => { setPgFormula(challenge.target); setPgResult(null); }}>Use this formula</button>
                          </div>
                        </details>
                      </div>
                    );
                  })()}
                </div>
              )}

            </div>
          )}

          {tab === "learn" && !selectedFormula && (
            <div>
              <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 23, marginBottom: 6 }}>
                {level === "beginner" ? "👋 Welcome to Formula Lab" : "🚀 Advanced Formula Lab"}
              </div>
              <div style={{ color: "#64748b", fontSize: 14, marginBottom: 26 }}>
                {level === "beginner"
                  ? "Learn Excel & Google Sheets formulas in plain English. No jargon — just clear explanations and real examples."
                  : "Explore nesting techniques, performance tips, and advanced patterns for power users."}
              </div>

              <div style={{ display: "flex", gap: 10, marginBottom: 26, flexWrap: "wrap" }} className="stat-cards-row">
                {[
                  { label: "Formulas", value: totalFormulas, icon: "⚡", onClick: () => setShowAllFormulas(true) },
                  { label: "Explored", value: viewedCount, icon: "✅" },
                  { label: "Saved", value: favorites.length, icon: "⭐" },
                  { label: "Categories", value: Object.keys(CATEGORIES).length, icon: "📂" },
                ].map(s => (
                  <div key={s.label} className={`stat-card${s.onClick ? " stat-card-btn" : ""}`} onClick={s.onClick || undefined} style={s.onClick ? { cursor: "pointer" } : {}}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{s.icon}</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 22, color: "#a5b4fc" }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: "#475569" }}>{s.label}</div>
                  </div>
                ))}
              </div>

              <div className="section-title">Browse by Category</div>
              <div className="cat-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(185px, 1fr))", gap: 10, marginBottom: 26 }}>
                {Object.entries(CATEGORIES).map(([cat, fmls]) => (
                  <div key={cat} className="cat-card" onClick={() => setExpandedCategory(cat)} style={{ cursor: "pointer" }}>
                    <div style={{ fontSize: 20, marginBottom: 6 }}>{cat.split(" ")[0]}</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 12, marginBottom: 4 }}>{cat.slice(3)}</div>
                    <div style={{ fontSize: 11, color: "#475569" }}>{fmls.length} formulas</div>
                    <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {fmls.slice(0, 4).map(f => <span key={f} style={{ fontSize: 10, color: "#6366f1", background: "#1e2040", padding: "2px 6px", borderRadius: 4 }}>{f}</span>)}
                      {fmls.length > 4 && <span style={{ fontSize: 10, color: "#475569" }}>+{fmls.length - 4}</span>}
                    </div>
                  </div>
                ))}
              </div>

              <div className="section-title">Quick Start — Popular Formulas</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {["SUM", "IF", "VLOOKUP", "XLOOKUP", "FILTER", "COUNTIFS", "IFERROR", "LET", "TEXTJOIN", "SUMPRODUCT", "UNIQUE", "SORT", "TEXT", "ROUND", "LEFT", "NETWORKDAYS"].map(f => (
                  <button key={f} className="quick-btn" onClick={() => handleFormulaSelect(f)}>{f}</button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
